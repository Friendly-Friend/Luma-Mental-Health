<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luma Mental Health - Parallax Scenery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Luma Mental Health</div>
        <div class="theme-controls">
            <!-- Morning (Sun Icon) -->
            <button class="theme-btn" onclick="setTheme('morning', this)" title="Morning">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
            </button>
            <!-- Evening (Sunset Icon) -->
            <button class="theme-btn active" onclick="setTheme('evening', this)" title="Evening">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0M12 2v4M5.22 10.22l2.83 2.83M18.78 10.22l-2.83 2.83M2 22h20"></path></svg>
            </button>
            <!-- Midnight (Moon Icon) -->
            <button class="theme-btn" onclick="setTheme('midnight', this)" title="Midnight">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
            </button>
            <!-- Rain (Cloud Rain Icon) -->
            <button class="theme-btn" onclick="setTheme('rain', this)" title="Rain">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242M16 14v6M8 14v6M12 16v6"></path></svg>
            </button>
        </div>
    </header>

    <div class="parallax-container">
        <div class="rain-container" id="rain-box"></div>
        
        <div class="parallax-layer" id="layer-sky"></div>
        
        <!-- Celestial Moon Structure -->
        <div class="celestial-body" id="moon-element"></div>
        
        <!-- Randomized Dynamic Stars Container -->
        <div class="twinkling-stars" id="stars-box"></div>
        
        <!-- Midnight Shooting Stars Engine -->
        <div class="shooting-stars">
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
            <span></span>
        </div>
        
        <div class="parallax-layer" id="layer-mountain-back"></div>
        <div class="parallax-layer" id="layer-mountain-mid"></div>
        <h1 class="hero-title" id="main-title">Find Your Calm</h1>
        <div class="parallax-layer" id="layer-mountain-front"></div>
    </div>

    <section class="app-content-section">
        <div class="container">
            <h2>Your Sanctuary Awaits</h2>
            <p>The system now controls an intelligent celestial engine. Toggle to Midnight to see shooting stars and twinkling constellations across the deep space layout.</p>
            <div class="placeholder-box">
                [ Main Mental Health App Module Interface / Mockup Placement Area ]
            </div>
        </div>
    </section>

    <script>
        // 1. Generate Rain Engine
        const rainBox = document.getElementById('rain-box');
        const dropCount = 85; 
        
        for (let i = 0; i < dropCount; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');
            drop.style.left = `${Math.random() * 120}%`;
            drop.style.top = `${Math.random() * -60}px`;
            drop.style.animationDuration = `${0.4 + Math.random() * 0.4}s`; 
            drop.style.animationDelay = `${Math.random() * 2}s`;
            rainBox.appendChild(drop);
        }

        // 2. NEW: Dynamic Randomized Stars Engine
        function generateRandomStars() {
            const starsBox = document.getElementById('stars-box');
            const starCount = 120; // Adjust for more or fewer stars

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // Completely random positions within the upper 60% of the viewport container
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 60}%`;
                
                // Randomized sizing so some stars look deep in space and others look close
                const size = Math.random() * 2 + 1; // Sizes between 1px and 3px
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                
                // Randomize twinkle speeds and starting points so they don't pulse together
                star.style.animationDuration = `${2 + Math.random() * 4}s`;
                star.style.animationDelay = `${Math.random() * 5}s`;
                
                starsBox.appendChild(star);
            }
        }
        
        // Fire up the star generation right away
        generateRandomStars();

        // 3. Parallax Scroll Physics Engine
        window.addEventListener('scroll', () => {
            const scrollPos = window.pageYOffset;
            
            const backLayer = document.getElementById('layer-mountain-back');
            const midLayer = document.getElementById('layer-mountain-mid');
            const frontLayer = document.getElementById('layer-mountain-front');
            const mainTitle = document.getElementById('main-title');
            const moonElement = document.getElementById('moon-element');

            backLayer.style.transform = `translateY(${scrollPos * 0.5}px)`;
            midLayer.style.transform = `translateY(${scrollPos * 0.25}px)`;
            frontLayer.style.transform = `translateY(${scrollPos * 0.05}px)`;
            mainTitle.style.transform = `translateY(${-50 + (scrollPos * 0.35)}px)`;
            moonElement.style.transform = `translateY(${scrollPos * 0.65}px)`;
        });

        // 4. Global State Theme Machine
        function setTheme(themeName, element) {
            document.documentElement.setAttribute('data-theme', themeName);

            const buttons = document.querySelectorAll('.theme-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }
    </script>
</body>
</html>
