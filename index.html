<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luma Periodic Table Visualizer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <div class="logo">Luma Element Visualizer</div>
        <div class="theme-controls">
            <button class="theme-btn" onclick="setTheme('morning', this)" title="Morning">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"></path></svg>
            </button>
            <button class="theme-btn active" onclick="setTheme('evening', this)" title="Evening">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0M12 2v4M5.22 10.22l2.83 2.83M18.78 10.22l-2.83 2.83M2 22h20"></path></svg>
            </button>
            <button class="theme-btn" onclick="setTheme('midnight', this)" title="Midnight">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
            </button>
            <button class="theme-btn" onclick="setTheme('rain', this)" title="Rain">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242M16 14v6M8 14v6M12 16v6"></path></svg>
            </button>
        </div>
    </header>

    <div class="parallax-container">
        <div class="rain-container" id="rain-box"></div>
        <div class="parallax-layer" id="layer-sky"></div>
        
        <div class="moon" id="moon-element"></div>
        
        <div class="twinkling-stars" id="stars-box"></div>
        
        <div class="shooting-stars">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        
        <div class="parallax-layer" id="layer-mountain-back"></div>
        <div class="parallax-layer" id="layer-mountain-mid"></div>
        <h1 class="hero-title" id="main-title">Elemental Spaces</h1>
        <div class="parallax-layer" id="layer-mountain-front"></div>
    </div>

    <section class="app-content-section">
        <div class="container table-container">
            <h2>Interactive Periodic Table</h2>
            <p>Explore the architecture of matter inside a reactive, hardware-accelerated grid optimized for all environmental shifts.</p>
            
            <div class="periodic-table-grid" id="periodic-table"></div>
        </div>
    </section>

    <script>
        // 1. Optimized High-Speed Precipitation Loop
        const rainBox = document.getElementById('rain-box');
        const dropCount = 60; 
        const rainFragment = document.createDocumentFragment();
        
        for (let i = 0; i < dropCount; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');
            drop.style.left = `${Math.random() * 120}%`;
            drop.style.top = `${Math.random() * -50}px`;
            drop.style.animationDuration = `${0.3 + Math.random() * 0.3}s`;
            drop.style.animationDelay = `${Math.random() * 2}s`;
            rainFragment.appendChild(drop);
        }
        rainBox.appendChild(rainFragment);

        // 2. Fragment-Cached Star Generation
        function generateStars() {
            const starsBox = document.getElementById('stars-box');
            starsBox.innerHTML = '';
            const starCount = 80;
            const starFragment = document.createDocumentFragment();

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 60}%`;
                
                const size = Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.animationDuration = `${2 + Math.random() * 3}s`;
                star.style.animationDelay = `${Math.random() * 4}s`;
                
                starFragment.appendChild(star);
            }
            starsBox.appendChild(starFragment);
        }
        generateStars();

        // 3. GPU-Accelerated Passive Scroll Frame Loop
        const backLayer = document.getElementById('layer-mountain-back');
        const midLayer = document.getElementById('layer-mountain-mid');
        const frontLayer = document.getElementById('layer-mountain-front');
        const mainTitle = document.getElementById('main-title');
        const moonElement = document.getElementById('moon-element');

        let ticking = false;

        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const scrollPos = window.pageYOffset;
                    
                    backLayer.style.transform = `translate3d(0, ${scrollPos * 0.45}px, 0)`;
                    midLayer.style.transform = `translate3d(0, ${scrollPos * 0.25}px, 0)`;
                    frontLayer.style.transform = `translate3d(0, ${scrollPos * 0.05}px, 0)`;
                    mainTitle.style.transform = `translate3d(0, ${-50 + (scrollPos * 0.35)}px, 0)`;
                    moonElement.style.transform = `translate3d(0, ${scrollPos * 0.55}px, 0)`;
                    
                    ticking = false;
                });
                ticking = true;
            }
        });

        // 4. Centralized Theme Router
        function setTheme(themeName, element) {
            document.documentElement.setAttribute('data-theme', themeName);
            
            const buttons = document.querySelectorAll('.theme-btn');
            buttons.forEach(btn => btn.classList.remove('active'));
            element.classList.add('active');
        }

        // 5. High-Performance Element Grid Builder
        const elementsData = [
            { num: 1, sym: "H", name: "Hydrogen", group: "nonmetal", col: 1, row: 1 },
            { num: 2, sym: "He", name: "Helium", group: "noble", col: 18, row: 1 },
            { num: 3, sym: "Li", name: "Lithium", group: "alkali", col: 1, row: 2 },
            { num: 4, sym: "Be", name: "Beryllium", group: "alkaline", col: 2, row: 2 },
            { num: 5, sym: "B", name: "Boron", group: "metalloid", col: 13, row: 2 },
            { num: 6, sym: "C", name: "Carbon", group: "nonmetal", col: 14, row: 2 },
            { num: 7, sym: "N", name: "Nitrogen", group: "nonmetal", col: 15, row: 2 },
            { num: 8, sym: "O", name: "Oxygen", group: "nonmetal", col: 16, row: 2 },
            { num: 9, sym: "F", name: "Fluorine", group: "halogen", col: 17, row: 2 },
            { num: 10, sym: "Ne", name: "Neon", group: "noble", col: 18, row: 2 },
            { num: 11, sym: "Na", name: "Sodium", group: "alk alkali", col: 1, row: 3 },
            { num: 12, sym: "Mg", name: "Magnesium", group: "alkaline", col: 2, row: 3 },
            { num: 13, sym: "Al", name: "Aluminium", group: "post-transition", col: 13, row: 3 },
            { num: 14, sym: "Si", name: "Silicon", group: "metalloid", col: 14, row: 3 },
            { num: 15, sym: "P", name: "Phosphorus", group: "nonmetal", col: 15, row: 3 },
            { num: 16, sym: "S", name: "Sulfur", group: "nonmetal", col: 16, row: 3 },
            { num: 17, sym: "Cl", name: "Chlorine", group: "halogen", col: 17, row: 3 },
            { num: 18, sym: "Ar", name: "Argon", group: "noble", col: 18, row: 3 },
            { num: 19, sym: "K", name: "Potassium", group: "alkali", col: 1, row: 4 },
            { num: 20, sym: "Ca", name: "Calcium", group: "alkaline", col: 2, row: 4 },
            { num: 21, sym: "Sc", name: "Scandium", group: "transition", col: 3, row: 4 },
            { num: 22, sym: "Ti", name: "Titanium", group: "transition", col: 4, row: 4 },
            { num: 26, sym: "Fe", name: "Iron", group: "transition", col: 8, row: 4 },
            { num: 29, sym: "Cu", name: "Copper", group: "transition", col: 11, row: 4 },
            { num: 30, sym: "Zn", name: "Zinc", group: "transition", col: 12, row: 4 },
            { num: 32, sym: "Ge", name: "Germanium", group: "metalloid", col: 14, row: 4 },
            { num: 35, sym: "Br", name: "Bromine", group: "halogen", col: 17, row: 4 },
            { num: 36, sym: "Kr", name: "Krypton", group: "noble", col: 18, row: 4 },
            { num: 79, sym: "Au", name: "Gold", group: "transition", col: 11, row: 6 },
            { num: 82, sym: "Pb", name: "Lead", group: "post-transition", col: 14, row: 6 },
            { num: 92, sym: "U", name: "Uranium", group: "actinide", col: 6, row: 9 }
        ];

        function renderPeriodicTable() {
            const tableContainer = document.getElementById('periodic-table');
            const fragment = document.createDocumentFragment();

            elementsData.forEach(elem => {
                const elementCard = document.createElement('div');
                elementCard.className = `element-card group-${elem.group}`;
                elementCard.style.gridColumn = elem.col;
                elementCard.style.gridRow = elem.row;
                
                elementCard.innerHTML = `
                    <span class="atomic-number">${elem.num}</span>
                    <span class="symbol">${elem.sym}</span>
                    <span class="name">${elem.name}</span>
                `;
                
                fragment.appendChild(elementCard);
            });

            tableContainer.appendChild(fragment);
        }
        
        // Execute structural rendering
        renderPeriodicTable();
    </script>
</body>
</html>
