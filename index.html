    <link rel="stylesheet" href="style.css">

    <header>
        <div class="logo">Luma Element Visualizer</div>
        <div class="theme-controls">
            <button class="theme-btn" onclick="setTheme('morning', this)" title="Morning">

            </button>

                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 18a5 5 0 0 0-10 0M12 2v4M5.22 10.22l2.83 2.83M18.78 10.22l-2.83 2.83M2 22h20"></path></svg>

                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>
            </button>

            </button>
        </div>
    </header>

    <div class="parallax-container">
        <div class="rain-container" id="rain-box"></div>
        <div class="parallax-layer" id="layer-sky"></div>
        
        <div class="moon" id="moon-element"></div>
        <div class="twinkling-stars" id="stars-box"></div>
        
        <div class="shooting-stars">
            <span></span><span></span><span></span><span></span><span></span>
        </div>
        
        <div class="parallax-layer" id="layer-mountain-back"></div>
        <div class="parallax-layer" id="layer-mountain-mid"></div>
        <h1 class="hero-title" id="main-title">Elemental Spaces</h1>
        <div class="parallax-layer" id="layer-mountain-front"></div>
    </div>

    <section class="app-content-section">
        <div class="container table-container">
            <h2>Interactive Periodic Table</h2>
            <p>Explore the architecture of matter. Click any element to project its live, quantum orbital atomic structure.</p>
            
            <div class="periodic-table-grid" id="periodic-table"></div>
        </div>
    </section>

    <div class="atomic-modal" id="atomic-modal">
        <div class="modal-card">
            <button class="close-modal-btn" onclick="closeModal()">&times;</button>
            <div class="modal-body">
                <div class="atomic-canvas-wrapper">
                    <canvas id="atom-canvas" width="400" height="400"></canvas>
                </div>
                <div class="atomic-details">
                    <h3 id="modal-element-name">Quantum Node</h3>
                    <div class="data-badge-row">
                        <span class="data-badge">Atomic Number: <strong id="modal-atomic-number">-</strong></span>
                        <span class="data-badge">Group: <strong id="modal-group">-</strong></span>
                    </div>
                    <div class="shell-config">
                        <h4>Electron Configuration per Shell:</h4>
                        <p id="modal-shells">-</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

        const rainBox = document.getElementById('rain-box');
        const dropCount = 60; 
        const rainFragment = document.createDocumentFragment();
        for (let i = 0; i < dropCount; i++) {
            const drop = document.createElement('div');
            drop.classList.add('drop');
            drop.style.left = `${Math.random() * 120}%`;
            drop.style.top = `${Math.random() * -50}px`;
            drop.style.animationDuration = `${0.3 + Math.random() * 0.3}s`;
            drop.style.animationDelay = `${Math.random() * 2}s`;
            rainFragment.appendChild(drop);
        }
        rainBox.appendChild(rainFragment);

        function generateStars() {
            const starsBox = document.getElementById('stars-box');
            starsBox.innerHTML = '';
            const starCount = 80;
            const starFragment = document.createDocumentFragment();
            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 60}%`;
                const size = Math.random() * 2 + 1;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.animationDuration = `${2 + Math.random() * 3}s`;
                star.style.animationDelay = `${Math.random() * 4}s`;
                starFragment.appendChild(star);
            }
            starsBox.appendChild(starFragment);
        }
        generateStars();

        const backLayer = document.getElementById('layer-mountain-back');
        const midLayer = document.getElementById('layer-mountain-mid');
        const frontLayer = document.getElementById('layer-mountain-front');
        const mainTitle = document.getElementById('main-title');
        const moonElement = document.getElementById('moon-element');
        let ticking = false;

        window.addEventListener('scroll', () => {
            if (!ticking) {
                window.requestAnimationFrame(() => {
                    const scrollPos = window.pageYOffset;
                    backLayer.style.transform = `translate3d(0, ${scrollPos * 0.45}px, 0)`;
                    midLayer.style.transform = `translate3d(0, ${scrollPos * 0.25}px, 0)`;
                    frontLayer.style.transform = `translate3d(0, ${scrollPos * 0.05}px, 0)`;
                    mainTitle.style.transform = `translate3d(0, ${-50 + (scrollPos * 0.35)}px, 0)`;
                    moonElement.style.transform = `translate3d(0, ${scrollPos * 0.55}px, 0)`;
                    ticking = false;
                });
                ticking = true;
            }
        });

        function renderPeriodicTable() {
            const tableContainer = document.getElementById('periodic-table');
            const fragment = document.createDocumentFragment();

            elementMap.forEach(elem => {
                const elementCard = document.createElement('div');
                elementCard.className = `element-card group-${elem.group}`;
                elementCard.style.gridColumn = elem.col;
                elementCard.style.gridRow = elem.row;
                
                elementCard.innerHTML = `
                    <span class="atomic-number">${elem.num}</span>
                    <span class="symbol">${elem.sym}</span>
                    <span class="name">${elem.name}</span>
                `;

                elementCard.addEventListener('click', () => openAtomicVisualizer(elem));
                fragment.appendChild(elementCard);
            });

            tableContainer.appendChild(fragment);
        }

        // 4. Quantum Canvas Orbital Animation Engine
        let animationFrameId = null;
        const canvas = document.getElementById('atom-canvas');
        const ctx = canvas.getContext('2d');
        
        function openAtomicVisualizer(element) {
            document.getElementById('modal-element-name').innerText = `${element.name} (${element.sym})`;
            document.getElementById('modal-atomic-number').innerText = element.num;
            document.getElementById('modal-group').innerText = element.group.toUpperCase();
            document.getElementById('modal-shells').innerText = element.shells.join(' - ');

            const modal = document.getElementById('atomic-modal');
            modal.classList.add('active');
            
            // Start Canvas Animation Loop
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
            
            let angle = 0;
            const shellCount = element.shells.length;
            
            // Resolve accent colors dynamically out from document system setup values
            const accentColor = getComputedStyle(document.documentElement).getPropertyValue('--accent-color').trim() || '#ffffff';

            function drawAtom() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;

                // Draw Core Nucleus
                ctx.beginPath();
                ctx.arc(cx, cy, 18, 0, Math.PI * 2);
                ctx.fillStyle = accentColor;
                ctx.shadowBlur = 15;
                ctx.shadowColor = accentColor;
                ctx.fill();
                ctx.shadowBlur = 0; // Reset canvas glow buffer state

                // Render Nucleus Center Label text
                ctx.fillStyle = document.documentElement.getAttribute('data-theme') === 'morning' ? '#1c2d37' : '#ffffff';
                ctx.font = 'bold 10px Segoe UI';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(`${element.sym}`, cx, cy);

                // Draw Electron Shell Tracks and Particles
                for (let i = 0; i < shellCount; i++) {
                    const radius = 45 + (i * 22);
                    const electronCount = element.shells[i];

                    // Draw track path
                    ctx.beginPath();
                    ctx.arc(cx, cy, radius, 0, Math.PI * 2);
                    ctx.strokeStyle = 'rgba(255, 255, 255, 0.08)';
                    if(document.documentElement.getAttribute('data-theme') === 'morning') {
                        ctx.strokeStyle = 'rgba(0, 0, 0, 0.06)';
                    }
                    ctx.lineWidth = 1;
                    ctx.stroke();

                    // Track calculations for spacing electrons perfectly along orbital circumference
                    for (let j = 0; j < electronCount; j++) {
                        // Alternate directions of rotation based on shell index parity
                        const directionMultiplier = i % 2 === 0 ? 1 : -1;
                        const localAngle = (angle * directionMultiplier * (1.2 / (i + 1))) + (j * (Math.PI * 2 / electronCount));
                        
                        const ex = cx + Math.cos(localAngle) * radius;
                        const ey = cy + Math.sin(localAngle) * radius;

                        ctx.beginPath();
                        ctx.arc(ex, ey, 4.5, 0, Math.PI * 2);
                        ctx.fillStyle = accentColor;
                        ctx.fill();
                    }
                }

                angle += 0.015;
                animationFrameId = requestAnimationFrame(drawAtom);
            }
            
            drawAtom();
        }

        function closeModal() {
            document.getElementById('atomic-modal').classList.remove('active');
            if(animationFrameId) cancelAnimationFrame(animationFrameId);
        }

        // Close modal if overlay is clicked directly
        document.getElementById('atomic-modal').addEventListener('click', function(e) {
            if (e.target === this) closeModal();
        });

        // Initialize grid on run
        renderPeriodicTable();
    </script>
</body>
</html>
